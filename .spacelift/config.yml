version: "1"

module_version: "0.4.0"

tests:
  - name: "Multi-app deployment"
    project_root: tests/spacelift
    after_apply:
      - echo "Waiting for EC2 boot + app startup..."
      - sleep 120
      - |
        URL=$(terraform output -json urls | jq -r '.app1')
        curl -sf "$URL" | grep -q '/vote' && echo "PASS: app1 is live (cats-vs-dogs)" || (echo "FAIL: app1 not ready" && exit 1)

version: "1"

module_version: "0.3.1"

tests:
  - name: "Multi-app deployment"
    project_root: tests/spacelift
    after_apply:
      - echo "Waiting for EC2 boot + apps startup..."
      - sleep 120
      - |
        URLS=$(terraform output -json urls | jq -r '.[]')
        PASS=true
        for URL in $URLS; do
          if curl -sf "$URL" | grep -q '<html'; then
            echo "PASS: $URL responds"
          else
            echo "FAIL: $URL not reachable"
            PASS=false
          fi
        done
        $PASS || exit 1

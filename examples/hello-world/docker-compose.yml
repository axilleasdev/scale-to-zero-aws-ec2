# Example workload: a minimal PHP app with MySQL.
#
# Deploy this on the EC2 to verify the stack works end-to-end.
# The app listens on port 8080 (matching the default `app_port` variable).
#
# Usage (on the EC2 via SSM):
#   cd /home/ubuntu/hello-world
#   docker compose up -d
#
# Then visit https://your-public-domain/ — you should see "Hello from
# scale-to-zero-aws-ec2!"

services:
  web:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ./index.php:/var/www/html/index.php:ro
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: app
    expose:
      - "3306"
    volumes:
      - /mnt/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchangeme"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tools
        run: pip install ruff pytest boto3

      - name: Lint
        run: ruff check lambda/

      - name: Test
        run: pytest tests/test_handlers.py -v
        env:
          AWS_DEFAULT_REGION: eu-central-1
